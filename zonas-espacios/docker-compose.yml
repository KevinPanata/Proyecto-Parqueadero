services:
  mysql-db:
    image: mysql:8.4
    container_name: zonas_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: zonas_espacios
    ports:
      - "3307:3306"
    volumes:
      - mysql_zonas_data:/var/lib/mysql
    networks:
      - zonas-network

  zonas-app:
    build: .
    container_name: zonas_app
    restart: always
    depends_on:
      - mysql-db
    ports:
      - "8081:8081"
    networks:
      - zonas-network

volumes:
  mysql_zonas_data:

networks:
  zonas-network: